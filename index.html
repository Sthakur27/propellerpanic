<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Propeller Panic</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
 <div id="game">
  <div id="hud"><div id="score">0</div></div>
  <div id="charges">⚡<span id="chargeNum">0</span></div>
  <button id="boostBtn"><span>⚡</span><span id="boostNum">0</span></button>
  <button id="pauseBtn" aria-label="Pause">⏸</button>

  <div id="start" class="overlay">
    <div class="card">
      <h1>🚁 Propeller Panic</h1>
      <div class="sub">Glide on your propeller and <b>land on a Bill's head</b> to bounce.
        Grab <b style="color:#7bffa9">⚡ power-ups</b> for a boost. Steer with <kbd>←</kbd> <kbd>→</kbd>.</div>
      <div class="modeBtns">
        <button id="btnSurvive" class="modeBtn">
          <span class="mIcon">🛡️</span><span class="mName">Survive</span>
          <span class="mDesc">Dodge &amp; stomp Bills as long as you can. Don't fall off the bottom.</span>
        </button>
        <button id="btnClimb" class="modeBtn">
          <span class="mIcon">🧗</span><span class="mName">Climb</span>
          <span class="mDesc">Bounce ever upward. Mind the platforms. Don't fall off the bottom.</span>
        </button>
      </div>
    </div>
  </div>

  <div id="over" class="overlay hidden">
    <div class="card">
      <h1>💥 Splat!</h1>
      <div class="big"><span id="finalScore">0</span></div>
      <div class="sub">Best: <span id="bestScore">0</span></div>
      <div class="ovBtns">
        <button id="retryBtn" class="ovBtn primary">↻ Retry</button>
        <button id="switchBtn" class="ovBtn">Switch mode</button>
      </div>
    </div>
  </div>

  <div id="pause" class="overlay hidden">
    <div class="card">
      <h1>⏸ Paused</h1>
      <div class="ovBtns">
        <button id="resumeBtn" class="ovBtn primary">▶ Resume</button>
        <button id="menuBtn" class="ovBtn">Menu</button>
      </div>
    </div>
  </div>
 </div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
