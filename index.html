<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Propeller Panic</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body {
    background:#0e1219;
    display:flex; align-items:center; justify-content:center;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-user-select:none; user-select:none; touch-action:none;
  }
  /* Portrait phone-shaped play column — fills a phone screen, letterboxed on desktop */
  #game {
    position:relative; overflow:hidden;
    width:  min(100vw, calc(100dvh * 9 / 16));
    height: min(100dvh, calc(100vw * 16 / 9));
    background: linear-gradient(#7ec8ff 0%, #aee2ff 45%, #d8f3ff 70%, #ffe9b8 100%);
    box-shadow: 0 0 90px rgba(0,0,0,.55);
  }
  #game canvas { position:absolute; inset:0; display:block; }

  #hud {
    position:absolute; top:14px; left:0; right:0; z-index:2;
    display:flex; justify-content:center; pointer-events:none;
  }
  #score {
    font-size:64px; font-weight:900; color:#fff;
    text-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 18px rgba(0,0,0,.15);
    transition:transform .08s ease-out; transform-origin:center;
  }
  #score.pop { transform:scale(1.35); }

  #charges {
    position:absolute; top:22px; right:16px; z-index:2; display:none;
    font-size:24px; font-weight:900; color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.3);
  }
  #charges.has { color:#bfffd6; }

  #boostBtn {
    position:absolute; left:50%; bottom:24px; transform:translateX(-50%);
    z-index:4; display:none; align-items:center; gap:7px;
    padding:13px 24px; border:none; border-radius:999px;
    font-family:inherit; font-weight:900; font-size:17px; letter-spacing:.5px;
    color:#fff; cursor:pointer; -webkit-tap-highlight-color:transparent;
    background:rgba(120,130,150,.5); box-shadow:0 4px 0 rgba(0,0,0,.25);
    opacity:.4; transition:transform .08s, opacity .15s;
  }
  #boostBtn.ready {
    background:linear-gradient(#34d36b,#15a04a); opacity:1;
    animation:pulse 1.1s ease-in-out infinite;
  }
  #boostBtn:active { transform:translateX(-50%) scale(.92); }
  @keyframes pulse {
    50% { box-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 24px rgba(52,211,107,.85); }
  }

  .modeBtns { display:flex; gap:12px; margin-top:20px; }
  .modeBtn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;
    padding:16px 12px; border:2px solid rgba(255,255,255,.55); border-radius:18px;
    background:rgba(255,255,255,.16); color:#fff; cursor:pointer; font-family:inherit;
    box-shadow:0 5px 0 rgba(0,0,0,.22); transition:transform .08s, background .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .modeBtn:hover { background:rgba(255,255,255,.26); }
  .modeBtn:active { transform:translateY(2px); box-shadow:0 3px 0 rgba(0,0,0,.22); }
  .mIcon { font-size:30px; }
  .mName { font-size:19px; font-weight:900; }
  .mDesc { font-size:12px; opacity:.85; line-height:1.35; }

  #pauseBtn {
    position:absolute; top:16px; left:14px; z-index:4; display:none;
    align-items:center; justify-content:center;
    width:44px; height:44px; border:none; border-radius:50%; padding:0;
    font-size:17px; color:#fff; cursor:pointer; -webkit-tap-highlight-color:transparent;
    background:rgba(40,55,80,.45); box-shadow:0 3px 0 rgba(0,0,0,.25);
  }
  #pauseBtn:active { transform:translateY(2px); }

  .ovBtns { display:flex; gap:12px; margin-top:20px; justify-content:center; flex-wrap:wrap; }
  .ovBtn {
    padding:13px 22px; border:2px solid rgba(255,255,255,.5); border-radius:14px;
    background:rgba(255,255,255,.16); color:#fff; cursor:pointer; font-family:inherit;
    font-weight:800; font-size:16px; box-shadow:0 4px 0 rgba(0,0,0,.22);
    -webkit-tap-highlight-color:transparent; transition:transform .08s, background .15s;
  }
  .ovBtn:hover { background:rgba(255,255,255,.26); }
  .ovBtn:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.22); }
  .ovBtn.primary { background:linear-gradient(#ffd23f,#f5a623); color:#3a2a00; border-color:rgba(255,255,255,.7); }

  .overlay {
    position:absolute; inset:0; z-index:3; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background:rgba(10,25,50,.35); backdrop-filter:blur(2px);
    color:#fff; padding:24px;
  }
  .overlay.hidden { display:none; }
  .card {
    background:rgba(255,255,255,.14); border:2px solid rgba(255,255,255,.5);
    border-radius:24px; padding:28px 26px; max-width:88%;
    box-shadow:0 12px 40px rgba(0,0,0,.25);
  }
  h1 { font-size:38px; font-weight:900; letter-spacing:-1px;
       text-shadow:0 4px 0 rgba(0,0,0,.25); margin-bottom:6px; }
  .sub { font-size:16px; opacity:.9; margin-bottom:20px; line-height:1.5; }
  .keys { font-size:15px; line-height:2; opacity:.95; }
  kbd {
    background:#fff; color:#234; border-radius:7px; padding:2px 10px;
    font-weight:800; box-shadow:0 3px 0 rgba(0,0,0,.25); font-size:14px;
  }
  .big { font-size:24px; font-weight:800; margin:14px 0; }
  .cta {
    margin-top:18px; font-size:18px; font-weight:800;
    animation:blink 1.1s ease-in-out infinite;
  }
  @keyframes blink { 50% { opacity:.35; } }
</style>
</head>
<body>
 <div id="game">
  <div id="hud"><div id="score">0</div></div>
  <div id="charges">⚡<span id="chargeNum">0</span></div>
  <button id="boostBtn"><span>⚡</span><span id="boostNum">0</span></button>
  <button id="pauseBtn" aria-label="Pause">⏸</button>

  <div id="start" class="overlay">
    <div class="card">
      <h1>🚁 Propeller Panic</h1>
      <div class="sub">Glide on your propeller and <b>land on a Bill's head</b> to bounce.
        Grab <b style="color:#7bffa9">⚡ power-ups</b> for a boost. Steer with <kbd>←</kbd> <kbd>→</kbd>.</div>
      <div class="modeBtns">
        <button id="btnSurvive" class="modeBtn">
          <span class="mIcon">🛡️</span><span class="mName">Survive</span>
          <span class="mDesc">Dodge &amp; stomp Bills as long as you can. Don't hit the spikes.</span>
        </button>
        <button id="btnClimb" class="modeBtn">
          <span class="mIcon">🧗</span><span class="mName">Climb</span>
          <span class="mDesc">Bounce ever upward. Mind the platforms. Don't fall off the bottom.</span>
        </button>
      </div>
    </div>
  </div>

  <div id="over" class="overlay hidden">
    <div class="card">
      <h1>💥 Splat!</h1>
      <div class="big"><span id="finalScore">0</span></div>
      <div class="sub">Best: <span id="bestScore">0</span></div>
      <div class="ovBtns">
        <button id="retryBtn" class="ovBtn primary">↻ Retry</button>
        <button id="switchBtn" class="ovBtn">Switch mode</button>
      </div>
    </div>
  </div>

  <div id="pause" class="overlay hidden">
    <div class="card">
      <h1>⏸ Paused</h1>
      <div class="ovBtns">
        <button id="resumeBtn" class="ovBtn primary">▶ Resume</button>
        <button id="menuBtn" class="ovBtn">Menu</button>
      </div>
    </div>
  </div>
 </div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ---------- world / renderer ----------
// Half world height. Grows (zooms out) at score thresholds — see targetZoom().
const H_BASE = 14, H_MAX = 24;
let H = H_BASE;
let W = H;
const gameEl = document.getElementById('game');
const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-W, W, H, -H, -100, 100);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
gameEl.appendChild(renderer.domElement);

function updateCamera(){
  const aspect = gameEl.clientWidth / gameEl.clientHeight;
  W = H * aspect;
  camera.left = -W; camera.right = W; camera.top = H; camera.bottom = -H;
  camera.updateProjectionMatrix();
}
function resize(){
  renderer.setSize(gameEl.clientWidth, gameEl.clientHeight);
  updateCamera();
}
addEventListener('resize', resize);
resize();

// Stepped, exponentially-decaying zoom-out: 3 steps at score 5 / 15 / 25, then max.
function targetZoom(){
  if (score >= 25) return H_MAX;   // 24
  if (score >= 15) return 22;
  if (score >= 5)  return 19;
  return H_BASE;                   // 14
}

// ---------- helpers ----------
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const rand  = (a,b)=>a + Math.random()*(b-a);

function roundedRect(w,h,r){
  r = Math.min(r, w/2, h/2);
  const s = new THREE.Shape();
  const x = -w/2, y = -h/2;
  s.moveTo(x+r, y);
  s.lineTo(x+w-r, y);             s.absarc(x+w-r, y+r,   r, -Math.PI/2, 0);
  s.lineTo(x+w,   y+h-r);         s.absarc(x+w-r, y+h-r, r, 0, Math.PI/2);
  s.lineTo(x+r,   y+h);           s.absarc(x+r,   y+h-r, r, Math.PI/2, Math.PI);
  s.lineTo(x,     y+r);           s.absarc(x+r,   y+r,   r, Math.PI, Math.PI*1.5);
  return s;
}
function shapeMesh(shape, color){
  return new THREE.Mesh(new THREE.ShapeGeometry(shape), new THREE.MeshBasicMaterial({ color }));
}
function circle(r, color){
  return new THREE.Mesh(new THREE.CircleGeometry(r, 24), new THREE.MeshBasicMaterial({ color }));
}

// ---------- background clouds ----------
const clouds = [];
for (let i=0;i<6;i++){
  const c = new THREE.Group();
  const col = 0xffffff;
  const a = shapeMesh(roundedRect(3.4,1.4,0.7), col);
  const b = shapeMesh(roundedRect(2.2,1.0,0.5), col); b.position.set(-1.2,0.3,0);
  const d = shapeMesh(roundedRect(2.0,0.9,0.45),col); d.position.set(1.2,0.2,0);
  [a,b,d].forEach(m=>{ m.material.transparent=true; m.material.opacity=0.55; c.add(m); });
  c.position.set(rand(-W,W), rand(-H+2, H-1), -5);
  c.userData.spd = rand(0.3,0.9);
  scene.add(c); clouds.push(c);
}

// ---------- death zone (bottom edge of the screen) ----------
// A soft red strip pinned to the bottom edge each frame — fall below it and you die.
const dangerBar = shapeMesh(roundedRect(120, 2.2, 0.0), 0xff3b3b);
dangerBar.material.transparent = true; dangerBar.material.opacity = 0.24;
dangerBar.position.z = 0.45;
scene.add(dangerBar);

// ---------- player ----------
const R = 0.6;
const player = new THREE.Group();
const body = circle(R, 0xffd23f);
const belly = circle(R*0.62, 0xfff0b8); belly.position.set(0,-0.05,0.01);
player.add(body, belly);
// eyes
function eye(x){
  const g = new THREE.Group();
  const wht = circle(0.17, 0xffffff);
  const pup = circle(0.085, 0x232634); pup.position.set(0.04,-0.01,0.01);
  g.add(wht, pup); g.position.set(x, 0.16, 0.02); return g;
}
player.add(eye(-0.20), eye(0.20));
// propeller
const prop = new THREE.Group();
const blade = shapeMesh(roundedRect(1.7,0.22,0.11), 0xff5a5a);
const hub   = circle(0.16, 0x444a5c); hub.position.z = 0.01;
prop.add(blade, hub);
prop.position.set(0, R+0.18, 0.05);
player.add(prop);
player.position.set(0, 5, 1);
scene.add(player);

// ---------- bullets ----------
const bullets = [];
function makeBullet(type){               // 'L' left→right, 'R' right→left, 'U' bottom→up, 'HOMING' chases
  const homing = type === 'HOMING';
  const horiz  = (type==='L' || type==='R');
  const w = homing ? 1.9 : (horiz ? 2.5 : 1.3);
  const h = homing ? 1.9 : (horiz ? 1.3 : 2.5);
  const g = new THREE.Group();
  const shell = shapeMesh(roundedRect(w,h,Math.min(w,h)/2), homing ? 0x9e1f30 : 0x2a2d3a);
  g.add(shell);
  // eyes near the leading edge (homing just keeps them up front)
  let off;
  if (homing){
    off = [[0.34,0.16],[-0.34,0.16]];
  } else {
    let ex=0, ey=0;
    if (type==='L') ex =  w*0.22;
    if (type==='R') ex = -w*0.22;
    if (type==='U') ey =  h*0.22;
    off = horiz ? [[ex,0.28],[ex,-0.28]] : [[0.28,ey],[-0.28,ey]];
  }
  const e1 = circle(0.17,0xffffff), e2 = circle(0.17,0xffffff);
  const p1 = circle(0.085,0x222222), p2 = circle(0.085,0x222222);
  e1.position.set(off[0][0],off[0][1],0.02); e2.position.set(off[1][0],off[1][1],0.02);
  p1.position.set(off[0][0],off[0][1],0.03); p2.position.set(off[1][0],off[1][1],0.03);
  g.add(e1,e2,p1,p2);
  if (homing){                            // a target ring to read as "locked on"
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(w*0.5, w*0.6, 28),
      new THREE.MeshBasicMaterial({ color:0xffd23f, transparent:true, opacity:0.9 }));
    ring.position.z = 0.04;
    g.add(ring);
  }
  g.userData = { type, homing, hw:w/2, hh:h/2, vx:0, vy:0, hit:false, shell, life:9 };
  return g;
}
// Decide a spawn (type / off-screen position / velocity / entry edge) without creating it yet.
function resolveSpawn(speed, opts){
  opts = opts || {};
  let type = opts.type;
  if (!type){
    if (Math.random() < homingChance) type = 'HOMING';
    else { const r = Math.random(); type = r < 0.4 ? 'L' : r < 0.8 ? 'R' : 'U'; }
  }
  const cy = camera.position.y;                                // view follows the camera
  const yLo = opts.yLo !== undefined ? opts.yLo : cy - H + 2.5;
  const yHi = opts.yHi !== undefined ? opts.yHi : cy + H - 2;
  const bottomY = cy - H - 2;                                  // off-screen below
  let pos, edge, vx = 0, vy = 0;
  if (type === 'HOMING'){
    const e = Math.floor(rand(0,3));
    if      (e === 0){ pos = [-W-2, rand(yLo,yHi)]; edge = 'L'; }
    else if (e === 1){ pos = [ W+2, rand(yLo,yHi)]; edge = 'R'; }
    else             { pos = [rand(-W+2, W-2), bottomY]; edge = 'U'; }
  }
  else if (type === 'L'){ pos = [-W-2, rand(yLo,yHi)]; vx =  speed; edge = 'L'; }
  else if (type === 'R'){ pos = [ W+2, rand(yLo,yHi)]; vx = -speed; edge = 'R'; }
  else                  { pos = [rand(-W+2, W-2), bottomY]; vy =  speed; edge = 'U'; }
  return { type, pos, vx, vy, edge, speed };
}
function realizeSpawn(p){
  const b = makeBullet(p.type), u = b.userData;
  b.position.set(p.pos[0], p.pos[1], 0.4);
  if (p.type === 'HOMING') u.speed = Math.min(p.speed * 0.78, 8.5);   // a touch slower so it's dodgeable
  else { u.vx = p.vx; u.vy = p.vy; }
  bullets.push(b); scene.add(b);
}

// ---- spawn telegraphs: flash a warning at the edge before the Bill enters ----
const warnings = [];
const WARN_DELAY = 0.75;
function makeWarning(){
  const g = new THREE.Group();
  const tri = new THREE.Shape();                 // arrow, apex toward +x by default
  tri.moveTo(0.62,0); tri.lineTo(-0.45,0.58); tri.lineTo(-0.45,-0.58);
  const m = shapeMesh(tri, 0xff3b3b); m.material.transparent = true;
  g.add(m);
  g.userData = { mat: m.material };
  return g;
}
function scheduleSpawn(speed, opts, delay){
  const p = resolveSpawn(speed, opts);
  const w = makeWarning();
  let wx, wy, rot;
  if      (p.edge === 'L'){ wx = -W + 1.0; wy = p.pos[1]; rot = 0; }
  else if (p.edge === 'R'){ wx =  W - 1.0; wy = p.pos[1]; rot = Math.PI; }
  else                    { wx = p.pos[0]; wy = camera.position.y - H + 1.0; rot = Math.PI / 2; }
  w.position.set(wx, wy, 0.7);
  w.rotation.z = rot;
  w.userData.t = 0;
  w.userData.delay = delay !== undefined ? delay : WARN_DELAY;
  w.userData.params = p;
  scene.add(w); warnings.push(w);
}
// Rescue drop into the bottom 10% of the screen when the player sinks too low (short warning).
function spawnRescue(speed){
  const r = Math.random();
  const type = r < 0.4 ? 'L' : r < 0.8 ? 'R' : 'U';
  scheduleSpawn(speed, { type, yLo: -H + 0.4, yHi: -H + 0.2 * H }, 0.5);
}
function clearBullets(){ bullets.forEach(b=>scene.remove(b)); bullets.length=0; }
function clearWarnings(){ warnings.forEach(w=>scene.remove(w)); warnings.length=0; }

// ---------- power-ups (collect → one-time boost charge) ----------
const powerups = [];
function makePowerup(){
  const g = new THREE.Group();
  const glow = circle(1.0, 0x2bd96b); glow.material.transparent = true; glow.material.opacity = 0.22;
  const disc = circle(0.62, 0x16a34a);
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.62, 0.74, 28),
                              new THREE.MeshBasicMaterial({ color:0xeafff1 }));
  const tri = new THREE.Shape(); tri.moveTo(0,0.36); tri.lineTo(-0.28,0.0); tri.lineTo(0.28,0.0);
  const arrow = shapeMesh(tri, 0xffffff); arrow.position.z = 0.02;
  const stem  = shapeMesh(roundedRect(0.16,0.34,0.05), 0xffffff); stem.position.set(0,-0.18,0.02);
  ring.position.z = 0.01; disc.position.z = 0.01;
  g.add(glow, disc, ring, arrow, stem);
  g.userData = { vx:0, t:0 };
  return g;
}
function spawnPowerup(){
  const p = makePowerup();
  const fromLeft = Math.random() < 0.5;
  const y = camera.position.y + rand(-H*0.25, H*0.6);
  if (fromLeft){ p.position.set(-W-1, y, 1.5); p.userData.vx =  rand(1.6, 2.6); }
  else         { p.position.set( W+1, y, 1.5); p.userData.vx = -rand(1.6, 2.6); }
  powerups.push(p); scene.add(p);
}
function clearPowerups(){ powerups.forEach(p=>scene.remove(p)); powerups.length=0; }

// ---------- platforms (Climb mode: solid bars with a gap to steer through) ----------
const platforms = [];
function makePlatform(y){
  const g = new THREE.Group();
  const gap = clamp(4.4 - score*0.005, 2.9, 4.4);            // narrows a little as you climb
  const gapCenter = rand(-W + gap/2 + 1.2, W - gap/2 - 1.2);
  const th = 0.85, ext = W + 2;
  const segs = [];
  const mkBar = (x0, x1) => {
    if (x1 - x0 < 0.3) return;
    const w = x1 - x0, cx = (x0 + x1) / 2;
    const bar = shapeMesh(roundedRect(w, th, 0.2), 0x8a5a3c);  bar.position.set(cx, 0, 0);
    const cap = shapeMesh(roundedRect(w, 0.24, 0.1), 0xb37c52); cap.position.set(cx, th/2 - 0.09, 0.01);
    g.add(bar, cap);
    segs.push({ x0, x1 });
  };
  mkBar(-ext, gapCenter - gap/2);
  mkBar(gapCenter + gap/2, ext);
  g.position.set(0, y, 0.6);
  g.userData = { segs, yc:y, hh:th/2 };
  platforms.push(g); scene.add(g);
  return g;
}
function clearPlatforms(){ platforms.forEach(p=>scene.remove(p)); platforms.length=0; }
function collidePlatforms(){
  for (const pf of platforms){
    const { yc, hh, segs } = pf.userData;
    if (Math.abs(player.position.y - yc) > hh + R + 0.2) continue;   // vertical reject
    for (const s of segs){
      const sx0 = s.x0 - R, sx1 = s.x1 + R, sy0 = yc - hh - R, sy1 = yc + hh + R;
      const px = player.position.x, py = player.position.y;
      if (px > sx0 && px < sx1 && py > sy0 && py < sy1){
        const pushL = px - sx0, pushR = sx1 - px, pushD = py - sy0, pushU = sy1 - py;
        if (Math.min(pushL, pushR) < Math.min(pushD, pushU)){
          player.position.x += (pushL < pushR ? -pushL : pushR); vx = 0;
        } else if (pushU < pushD){
          player.position.y += pushU; if (vy < 0) vy = 0;          // landed on top
        } else {
          player.position.y -= pushD; if (vy > 0) vy = 0;          // bonk from below
        }
      }
    }
  }
}

// ---------- particles ----------
const particles = [];
function burst(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const m = circle(rand(0.08,0.18), color);
    m.material.transparent = true;
    m.position.set(x,y,2);
    const a = Math.random()*Math.PI*2, sp = rand(3,8);
    particles.push({ m, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp+2, life:rand(0.4,0.7) });
    scene.add(m);
  }
}

// ---------- audio ----------
let actx = null;
function initAudio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function sfx(type){
  if(!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  const t = actx.currentTime;
  if(type==='bounce'){
    o.type='square'; o.frequency.setValueAtTime(420,t);
    o.frequency.exponentialRampToValueAtTime(900,t+0.12);
    g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.start(t); o.stop(t+0.2);
  } else if(type==='power'){
    o.type='triangle'; o.frequency.setValueAtTime(620,t);
    o.frequency.setValueAtTime(820,t+0.08); o.frequency.setValueAtTime(1040,t+0.16);
    g.gain.setValueAtTime(0.16,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.26);
    o.start(t); o.stop(t+0.28);
  } else if(type==='boost'){
    o.type='sawtooth'; o.frequency.setValueAtTime(480,t);
    o.frequency.exponentialRampToValueAtTime(1300,t+0.22);
    g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.start(t); o.stop(t+0.32);
  } else { // die
    o.type='sawtooth'; o.frequency.setValueAtTime(320,t);
    o.frequency.exponentialRampToValueAtTime(55,t+0.5);
    g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.55);
    o.start(t); o.stop(t+0.6);
  }
}

// ---------- game state ----------
// Always a gentle propeller glide: gravity pulls down but downward speed is
// capped at FALL_TERMINAL, so you never dead-drop. A bounce sends you up fast,
// you arc over, then settle back into the slow glide. (A consumable propeller
// boost will hook in here later.)
const GRAV = 24, FALL_TERMINAL = -4.4;
const MAX_VX = 13, ACCEL = 70, DRAG = 42, BOUNCE = 18, BOOST = 29;
const POWERUP_INTERVAL = 9;     // seconds between power-up spawns
const GAME_SPEED = 0.65;        // global pace: <1 slows everything uniformly (fall, Bills, momentum, spawns)
const keys = { left:false, right:false };

let state = 'start';            // 'start' | 'playing' | 'over'
let mode = 'survive';           // 'survive' | 'climb'
let lastMode = 'survive';
let score = 0;
const best = { survive:0, climb:0 };
let vy = 0, vx = 0, prevY = 0, time = 0;
let spawnTimer = 0, powerupTimer = 0;
let boostCharges = 0;
let rescueArmed = true;
let homingChance = 0;           // set per-frame; read by resolveSpawn
// climb-mode tracking
let startY = 0, maxClimbY = 0, nextPlatformY = 0;

const scoreEl  = document.getElementById('score');
const startEl  = document.getElementById('start');
const overEl   = document.getElementById('over');
const chargesEl = document.getElementById('charges');
const chargeNum = document.getElementById('chargeNum');
const boostBtn  = document.getElementById('boostBtn');
const boostNum  = document.getElementById('boostNum');
const pauseBtn  = document.getElementById('pauseBtn');
const pauseEl   = document.getElementById('pause');

function updateCharges(){
  chargeNum.textContent = boostCharges;
  boostNum.textContent  = boostCharges;
  chargesEl.classList.toggle('has', boostCharges > 0);
  boostBtn.classList.toggle('ready', boostCharges > 0);
}

function setScore(v){
  score = v; scoreEl.textContent = v;
  scoreEl.classList.add('pop');
  setTimeout(()=>scoreEl.classList.remove('pop'), 90);
}

function startGame(m){
  mode = m || lastMode || 'survive';
  lastMode = mode;
  clearBullets();
  clearWarnings();
  clearPowerups();
  clearPlatforms();
  particles.forEach(p=>scene.remove(p.m)); particles.length=0;
  score = 0; homingChance = 0;
  H = H_BASE; updateCamera();
  player.rotation.z = 0;
  if (mode === 'survive'){
    camera.position.y = 0;
    player.position.set(0, H * 0.72, 1);
  } else {                                   // climb
    player.position.set(0, 0, 1);
    camera.position.y = player.position.y + H * 0.24;
    startY = player.position.y; maxClimbY = player.position.y;
    nextPlatformY = player.position.y + 11;
  }
  vy = FALL_TERMINAL; vx = 0; prevY = player.position.y; time = 0;
  boostCharges = 0; rescueArmed = true;
  scoreEl.textContent = mode === 'climb' ? '0m' : '0';
  updateCharges();
  startEl.classList.add('hidden');
  overEl.classList.add('hidden');
  pauseEl.classList.add('hidden');
  chargesEl.style.display = 'block';
  boostBtn.style.display = 'flex';
  pauseBtn.style.display = 'flex';
  state = 'playing';
  // give the player something to bounce on right away
  scheduleSpawn(6.5, {}, 0.6);
  if (mode === 'climb') scheduleSpawn(7, {}, 1.0);
  spawnTimer = 0.7;
  powerupTimer = POWERUP_INTERVAL - 3;   // first power-up fairly soon
}

function die(){
  if(state!=='playing') return;
  state = 'over';
  best[mode] = Math.max(best[mode], score);
  const suffix = mode === 'climb' ? 'm' : '';
  document.getElementById('finalScore').textContent = score + suffix;
  document.getElementById('bestScore').textContent = best[mode] + suffix;
  burst(player.position.x, player.position.y, 0xff5a5a, 22);
  sfx('die');
  overEl.classList.remove('hidden');
  chargesEl.style.display = 'none';
  boostBtn.style.display = 'none';
  pauseBtn.style.display = 'none';
}

function useBoost(){
  if (state !== 'playing' || boostCharges <= 0) return;
  boostCharges--; updateCharges();
  vy = BOOST;
  burst(player.position.x, player.position.y - R, 0x2bd96b, 18);
  sfx('boost');
}

function pause(){
  if (state !== 'playing') return;
  state = 'paused';
  pauseEl.classList.remove('hidden');
  pauseBtn.style.display = 'none';
}
function resume(){
  if (state !== 'paused') return;
  pauseEl.classList.add('hidden');
  pauseBtn.style.display = 'flex';
  last = performance.now();      // avoid a one-frame dt spike after a long pause
  state = 'playing';
}
function toMenu(){
  clearBullets(); clearWarnings(); clearPowerups(); clearPlatforms();
  particles.forEach(p=>scene.remove(p.m)); particles.length = 0;
  H = H_BASE; camera.position.y = 0; updateCamera();
  player.position.set(0, H*0.72, 1); player.rotation.z = 0;
  pauseEl.classList.add('hidden');
  overEl.classList.add('hidden');
  startEl.classList.remove('hidden');
  pauseBtn.style.display = 'none';
  chargesEl.style.display = 'none';
  boostBtn.style.display = 'none';
  state = 'start';
}

// ---------- per-frame ----------
function tick(dt){
  dt *= GAME_SPEED;             // slow the whole simulation uniformly
  time += dt;

  // ----- difficulty + spawns (mode-aware) -----
  let spawnInterval, speed;
  if (mode === 'survive'){
    const tz = targetZoom();                       // smooth zoom-out at score thresholds
    if (Math.abs(H - tz) > 0.001){ H += (tz - H) * Math.min(1, 2.5 * dt); updateCamera(); }
    homingChance = clamp((score - 4) * 0.03, 0, 0.35);   // from ~score 5, ramps to 35%
    spawnInterval = Math.max(0.45, 0.95 - score*0.015 - time*0.004);
    speed = 6.5 + score*0.12 + time*0.05;
  } else {                                          // climb: difficulty scales with height
    homingChance = clamp((score - 15) * 0.006, 0, 0.30);
    spawnInterval = Math.max(0.5, 0.92 - score*0.003);
    speed = 6.5 + score*0.04;
  }
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval){ spawnTimer = 0; scheduleSpawn(speed + rand(0,2.5)); }

  // Climb: follow the player's peak upward (never down) + lay platforms ahead, cull below
  if (mode === 'climb'){
    const camTarget = player.position.y + H * 0.24;
    if (camTarget > camera.position.y) camera.position.y = camTarget;
    while (nextPlatformY < camera.position.y + H + 6){ makePlatform(nextPlatformY); nextPlatformY += rand(8, 13); }
    for (let i=platforms.length-1; i>=0; i--){
      if (platforms[i].userData.yc < camera.position.y - H - 4){ scene.remove(platforms[i]); platforms.splice(i,1); }
    }
  }

  // telegraphed spawns: flash the warning, then realize the Bill when it expires
  for (let i=warnings.length-1; i>=0; i--){
    const w = warnings[i], u = w.userData;
    u.t += dt;
    u.mat.opacity = 0.35 + 0.65 * Math.abs(Math.sin(u.t * 12));
    w.scale.setScalar(0.85 + 0.5 * (u.t / u.delay));
    if (u.t >= u.delay){ realizeSpawn(u.params); scene.remove(w); warnings.splice(i,1); }
  }

  // power-ups drift in periodically
  powerupTimer += dt;
  if (powerupTimer >= POWERUP_INTERVAL){ powerupTimer = 0; spawnPowerup(); }

  // player physics — gravity, but capped to a slow glide on the way down
  vy -= GRAV * dt;
  if (vy < FALL_TERMINAL) vy = FALL_TERMINAL;
  prevY = player.position.y;
  player.position.y += vy * dt;

  // horizontal momentum: accelerate while steering, coast to a stop on release
  let dir = 0;
  if (keys.left)  dir -= 1;
  if (keys.right) dir += 1;
  if (dir !== 0){
    vx += dir * ACCEL * dt;
  } else {                                   // drag toward zero
    const d = DRAG * dt;
    vx = Math.abs(vx) <= d ? 0 : vx - Math.sign(vx) * d;
  }
  vx = clamp(vx, -MAX_VX, MAX_VX);
  let nx = player.position.x + vx * dt;
  if (nx < -W + R){ nx = -W + R; vx = 0; }    // bonk the walls, kill momentum
  if (nx >  W - R){ nx =  W - R; vx = 0; }
  player.position.x = nx;
  player.rotation.z = -clamp(vx / MAX_VX, -1, 1) * 0.3;   // lean into the drift

  // survive has a ceiling; climb is open upward
  if (mode === 'survive' && player.position.y > H-R){ player.position.y = H-R; if(vy>0) vy=0; }

  // propeller always spins; faster while shooting upward
  prop.rotation.z -= (13 + Math.max(0, vy) * 1.1) * dt;

  if (mode === 'survive'){
    // rescue: if you sink past the screen midpoint, drop a Bill into the bottom band
    if (player.position.y < 0 && rescueArmed){ spawnRescue(7); rescueArmed = false; }
    if (player.position.y > H * 0.25) rescueArmed = true;
  } else {
    collidePlatforms();   // resolve solid platform collisions after the move
  }

  // bullets
  for (let i=bullets.length-1; i>=0; i--){
    const b = bullets[i], u = b.userData;

    if (u.homing && !u.hit){             // steer velocity toward the player
      const dx = player.position.x - b.position.x;
      const dy = player.position.y - b.position.y;
      const len = Math.hypot(dx, dy) || 1;
      const turn = Math.min(1, 2.4 * dt);
      u.vx += (dx/len * u.speed - u.vx) * turn;
      u.vy += (dy/len * u.speed - u.vy) * turn;
    }

    b.position.x += u.vx*dt;
    b.position.y += u.vy*dt;

    if (u.hit){                          // defeated: shrink & spin out
      b.scale.multiplyScalar(1 - 3*dt);
      b.rotation.z += 12*dt;
      b.position.y += 4*dt;
      if (b.scale.x < 0.06){ scene.remove(b); bullets.splice(i,1); }
      continue;
    }

    // cleanup — homing Bills despawn on a timer; the rest when they leave the view
    const cy = camera.position.y;
    if (u.homing){
      u.life -= dt;
      if (u.life <= 0 || b.position.y < cy-H-6 || Math.abs(b.position.x) > W+6){
        scene.remove(b); bullets.splice(i,1); continue;
      }
    } else if (b.position.x < -W-4 || b.position.x > W+4 || b.position.y > cy+H+4 || b.position.y < cy-H-8){
      scene.remove(b); bullets.splice(i,1); continue;
    }

    // collision (AABB)
    const px = player.position.x, py = player.position.y;
    const ox = Math.abs(px - b.position.x) < (u.hw + R*0.75);
    const oy = Math.abs(py - b.position.y) < (u.hh + R*0.75);
    if (ox && oy){
      const top = b.position.y + u.hh;
      if (vy < 0 && (prevY - R) >= top - 0.5){     // landed on the head
        const lowThird = player.position.y < camera.position.y - H / 3;   // bottom third of view
        vy = BOUNCE * (lowThird ? 1.25 : 1);           // stronger save when you're low
        u.hit = true;
        u.shell.material.color.set(u.homing ? 0xc98a92 : 0x6b7287);
        burst(px, top, 0xfff176, 14);
        sfx('bounce');
        if (mode === 'survive') setScore(score + 1);   // climb scores by height instead
      } else {
        die();
      }
    }
  }

  // power-ups: bob across, collect on contact → +1 boost charge
  for (let i=powerups.length-1; i>=0; i--){
    const p = powerups[i], u = p.userData;
    u.t += dt;
    p.position.x += u.vx * dt;
    p.position.y += Math.sin(u.t * 2.0) * 0.8 * dt;
    p.rotation.z  = Math.sin(u.t * 3.0) * 0.15;
    if (p.position.x < -W-3 || p.position.x > W+3 || p.position.y < camera.position.y-H-3){ scene.remove(p); powerups.splice(i,1); continue; }
    if (Math.abs(p.position.x - player.position.x) < (0.7 + R) &&
        Math.abs(p.position.y - player.position.y) < (0.7 + R)){
      scene.remove(p); powerups.splice(i,1);
      boostCharges++; updateCharges();
      burst(p.position.x, p.position.y, 0x2bd96b, 16);
      sfx('power');
    }
  }

  // climb height score
  if (mode === 'climb'){
    maxClimbY = Math.max(maxClimbY, player.position.y);
    const h = Math.max(0, Math.floor(maxClimbY - startY));
    if (h !== score){ score = h; scoreEl.textContent = h + 'm'; }
  }
  // lose: fall below the bottom edge of the screen (both modes)
  if (player.position.y + R < camera.position.y - H) die();
}

function updateParticles(dt){
  for (let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.life -= dt;
    p.vy -= 14*dt;
    p.m.position.x += p.vx*dt;
    p.m.position.y += p.vy*dt;
    p.m.material.opacity = Math.max(0, p.life*1.6);
    p.m.scale.multiplyScalar(1 - 1.2*dt);
    if (p.life <= 0){ scene.remove(p.m); particles.splice(i,1); }
  }
}

// ---------- loop ----------
let last = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  let dt = (now - last)/1000; last = now;
  dt = Math.min(dt, 0.033);

  const cy = camera.position.y;
  dangerBar.position.y = cy - H + 0.4;     // hug the bottom edge of the view
  clouds.forEach(c=>{
    c.position.x -= c.userData.spd*dt;
    if (c.position.x < -W-4){ c.position.x = W+4; c.position.y = cy + rand(-H+2, H-1); }
    if (c.position.y < cy - H - 3){ c.position.y = cy + H + 2; c.position.x = rand(-W, W); }  // recycle below→above while climbing
  });

  if (state === 'playing'){ tick(dt); }
  else { prop.rotation.z -= 4*dt; }   // idle propeller on menus

  updateParticles(dt);
  renderer.render(scene, camera);
}
requestAnimationFrame(loop);

// ---------- input ----------
function press(){
  initAudio();
  if (state === 'playing' || state === 'paused') return;
  startGame(lastMode);     // restart the mode you were playing
}
addEventListener('keydown', e=>{
  if (e.code==='ArrowLeft'  || e.code==='KeyA') keys.left = true;
  if (e.code==='ArrowRight' || e.code==='KeyD') keys.right = true;
  if (e.code==='Space' || e.code==='ArrowUp' || e.code==='KeyW'){
    e.preventDefault();
    if (state === 'playing')      { initAudio(); useBoost(); }   // spend a charge for a boost
    else if (state === 'paused')  resume();
    else                          press();                       // start / restart
  }
  if ((e.code==='KeyP' || e.code==='Escape')){
    e.preventDefault();
    if (state === 'playing') pause();
    else if (state === 'paused') resume();
  }
  if (e.code==='KeyR' && state==='over') press();
});
addEventListener('keyup', e=>{
  if (e.code==='ArrowLeft'  || e.code==='KeyA') keys.left = false;
  if (e.code==='ArrowRight' || e.code==='KeyD') keys.right = false;
});

// touch: hold left / right half of the screen to steer
function touchUpdate(touches){
  keys.left = keys.right = false;
  for (const t of touches){
    if (t.clientX < innerWidth*0.5) keys.left = true;
    else keys.right = true;
  }
}
addEventListener('touchstart', e=>{ e.preventDefault(); if(state==='over') press(); touchUpdate(e.touches); }, {passive:false});
addEventListener('touchmove',  e=>{ e.preventDefault(); touchUpdate(e.touches); }, {passive:false});
addEventListener('touchend',   e=>{ touchUpdate(e.touches); }, {passive:false});
addEventListener('mousedown', e=>{ if(state==='over') press(); });

// boost button (touch + click) — fire the stored charge, don't trigger steering/start
function boostTap(e){ e.preventDefault(); e.stopPropagation(); initAudio(); useBoost(); }
boostBtn.addEventListener('touchstart', boostTap, {passive:false});
boostBtn.addEventListener('mousedown', boostTap);

// start-screen mode buttons (stopPropagation so they don't also hit the window handlers)
function pickMode(m){ return e=>{ e.preventDefault(); e.stopPropagation(); initAudio(); startGame(m); }; }
const btnSurvive = document.getElementById('btnSurvive');
const btnClimb   = document.getElementById('btnClimb');
btnSurvive.addEventListener('mousedown',  pickMode('survive'));
btnSurvive.addEventListener('touchstart', pickMode('survive'), {passive:false});
btnClimb.addEventListener('mousedown',  pickMode('climb'));
btnClimb.addEventListener('touchstart', pickMode('climb'), {passive:false});

// pause / death-screen buttons (stopPropagation so they don't hit the window handlers)
function tap(el, fn){
  const h = e => { e.preventDefault(); e.stopPropagation(); initAudio(); fn(); };
  el.addEventListener('mousedown', h);
  el.addEventListener('touchstart', h, {passive:false});
}
tap(pauseBtn, pause);
tap(document.getElementById('resumeBtn'), resume);
tap(document.getElementById('menuBtn'),   toMenu);
tap(document.getElementById('retryBtn'),  ()=>startGame(lastMode));
tap(document.getElementById('switchBtn'), toMenu);
</script>
</body>
